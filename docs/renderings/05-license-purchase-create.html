<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Record License Purchase - Software License Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
</head>
<body>
<header>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="01-dashboard.html"><i class="bi bi-shield-check me-2"></i>License Tracker</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="01-dashboard.html"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="02-software-titles.html"><i class="bi bi-box-seam me-1"></i>Software Titles</a></li>
          <li class="nav-item"><a class="nav-link active" href="04-license-purchases.html"><i class="bi bi-receipt me-1"></i>License Purchases</a></li>
          <li class="nav-item"><a class="nav-link" href="06-maintenance-contracts.html"><i class="bi bi-tools me-1"></i>Maintenance Contracts</a></li>
          <li class="nav-item"><a class="nav-link" href="08-subscriptions.html"><i class="bi bi-arrow-repeat me-1"></i>Subscriptions</a></li>
        </ul>
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="06-maintenance-contracts.html"><i class="bi bi-bell me-1 text-warning"></i>Expiring Soon</a></li>
        </ul>
      </div>
    </div>
  </nav>
</header>

<div class="container-fluid mt-3">
  <main role="main" class="pb-3">

    <div class="row justify-content-center">
      <div class="col-lg-7 col-md-9">

        <nav aria-label="breadcrumb" class="mb-3">
          <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="04-license-purchases.html">License Purchases</a></li>
            <li class="breadcrumb-item active">Record Purchase</li>
          </ol>
        </nav>

        <div class="card">
          <div class="card-header">
            <h4 class="mb-0"><i class="bi bi-receipt me-2"></i>Record License Purchase</h4>
          </div>
          <div class="card-body">
            <form>
              <div class="mb-3">
                <label class="form-label fw-semibold">Software Title <span class="text-danger">*</span></label>
                <select class="form-select">
                  <option value="">— Select Software Title —</option>
                  <option>Adobe Creative Cloud</option>
                  <option>AutoCAD 2024</option>
                  <option>CrowdStrike Falcon</option>
                  <option>GitHub Enterprise</option>
                  <option>Jira Software</option>
                  <option selected>Microsoft Office 365</option>
                  <option>Salesforce CRM</option>
                  <option>Slack Business+</option>
                  <option>SQL Server 2022</option>
                  <option>Tableau Desktop</option>
                  <option>Windows Server 2022</option>
                  <option>Zoom Meetings Pro</option>
                </select>
              </div>

              <div class="row g-3 mb-3">
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Purchase Date <span class="text-danger">*</span></label>
                  <input type="date" class="form-control" value="2026-05-22" />
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-semibold">License Type <span class="text-danger">*</span></label>
                  <select class="form-select">
                    <option>Perpetual</option>
                    <option>Named User</option>
                    <option>Concurrent</option>
                    <option>OEM</option>
                    <option>Server</option>
                    <option>Volume</option>
                  </select>
                </div>
              </div>

              <div class="row g-3 mb-3">
                <div class="col-md-4">
                  <label class="form-label fw-semibold">Quantity <span class="text-danger">*</span></label>
                  <input type="number" class="form-control" value="50" min="1" />
                </div>
                <div class="col-md-4">
                  <label class="form-label fw-semibold">Total Cost</label>
                  <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input type="number" class="form-control" placeholder="0.00" step="0.01" />
                  </div>
                </div>
                <div class="col-md-4">
                  <label class="form-label fw-semibold">Order / PO Number</label>
                  <input type="text" class="form-control" placeholder="PO-2026-…" />
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold">License Key / Serial</label>
                <input type="text" class="form-control" placeholder="XXXXX-XXXXX-XXXXX-XXXXX" />
                <div class="form-text">Optional. Stored securely.</div>
              </div>

              <div class="mb-4">
                <label class="form-label fw-semibold">Notes</label>
                <textarea class="form-control" rows="3" placeholder="Purchased via Microsoft Volume Licensing…"></textarea>
              </div>

              <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Save</button>
                <a href="04-license-purchases.html" class="btn btn-outline-secondary">Cancel</a>
              </div>
            </form>
          </div>
        </div>

      </div>
    </div>

  </main>
</div>

<footer class="border-top footer text-muted bg-light py-2 mt-4">
  <div class="container-fluid"><small>Software License Tracker &copy; 2026</small></div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
