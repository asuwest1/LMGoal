<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Software Title - Software License Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
</head>
<body>
<header>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="01-dashboard.html"><i class="bi bi-shield-check me-2"></i>License Tracker</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="01-dashboard.html"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a></li>
          <li class="nav-item"><a class="nav-link active" href="02-software-titles.html"><i class="bi bi-box-seam me-1"></i>Software Titles</a></li>
          <li class="nav-item"><a class="nav-link" href="04-license-purchases.html"><i class="bi bi-receipt me-1"></i>License Purchases</a></li>
          <li class="nav-item"><a class="nav-link" href="06-maintenance-contracts.html"><i class="bi bi-tools me-1"></i>Maintenance Contracts</a></li>
          <li class="nav-item"><a class="nav-link" href="08-subscriptions.html"><i class="bi bi-arrow-repeat me-1"></i>Subscriptions</a></li>
        </ul>
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="06-maintenance-contracts.html"><i class="bi bi-bell me-1 text-warning"></i>Expiring Soon</a></li>
        </ul>
      </div>
    </div>
  </nav>
</header>

<div class="container-fluid mt-3">
  <main role="main" class="pb-3">

    <div class="row justify-content-center">
      <div class="col-lg-6 col-md-8">

        <nav aria-label="breadcrumb" class="mb-3">
          <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="02-software-titles.html">Software Titles</a></li>
            <li class="breadcrumb-item active">Create</li>
          </ol>
        </nav>

        <div class="card">
          <div class="card-header">
            <h4 class="mb-0"><i class="bi bi-plus-circle me-2"></i>Add Software Title</h4>
          </div>
          <div class="card-body">
            <form>
              <div class="mb-3">
                <label class="form-label fw-semibold">Name <span class="text-danger">*</span></label>
                <input type="text" class="form-control" placeholder="e.g. Microsoft Office 365" />
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold">Vendor <span class="text-danger">*</span></label>
                <input type="text" class="form-control" placeholder="e.g. Microsoft" />
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold">Category</label>
                <input type="text" class="form-control" placeholder="e.g. Collaboration, Design, Development…" />
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold">Website</label>
                <input type="url" class="form-control" placeholder="https://…" />
              </div>
              <div class="mb-4">
                <label class="form-label fw-semibold">Notes</label>
                <textarea class="form-control" rows="3" placeholder="Any additional notes about this software…"></textarea>
              </div>
              <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Save</button>
                <a href="02-software-titles.html" class="btn btn-outline-secondary">Cancel</a>
              </div>
            </form>
          </div>
        </div>

      </div>
    </div>

  </main>
</div>

<footer class="border-top footer text-muted bg-light py-2 mt-4">
  <div class="container-fluid"><small>Software License Tracker &copy; 2026</small></div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
